name: CI/CD 自动部署

# ============================================================
# 触发条件设计（Promotion-based Deployment 晋级式部署）
#
# push 分支         → 触发 CI（代码质量卡点）
# workflow_dispatch → 触发 CI + CD（人工决策部署）
#   event=deploy-dev  → CI 通过后构建镜像、部署测试环境
#   event=deploy-prod → CI 通过后给 sha 镜像追加版本 tag、部署生产
#
# CI 复用设计：
#   ci job 的 if 条件同时包含 push 和 workflow_dispatch 两种事件
#   deploy-dev / deploy-prod 都通过 needs: ci 强制依赖
#   无论哪种方式触发部署，都必须先通过 CI 校验，消除重复代码
# ============================================================
on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      event:
        description: '选择操作类型'
        required: true
        type: choice
        options:
          - deploy-dev
          - deploy-prod
      tag:
        description: '生产部署时填写，对应测试验证过的 tag，如 v1.0.0'
        required: false
        default: ''

jobs:
  # ==================== CI：代码校验 ====================
  # 触发：push 任意分支 或 workflow_dispatch（任意 event）
  # 职责：代码质量卡点，deploy-dev / deploy-prod 都通过 needs: ci 强制依赖
  ci:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: 设置 Node 版本
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: |
          echo 'registry=https://registry.npmjs.org' > .npmrc
          npm ci

      - name: 类型检查
        run: npm run type-check

      - name: 构建校验
        run: npm run build

  # ==================== CD：测试环境部署 ====================
  # 触发：workflow_dispatch + event=deploy-dev
  # 职责：构建镜像（sha tag），部署到测试环境，供 QA 验证
  #
  # 镜像 tag 策略：
  #   使用 git sha 作为 tag，不可变，精确对应这次 commit，可完整追溯
  deploy-dev:
    needs: ci
    if: github.event_name == 'workflow_dispatch' && inputs.event == 'deploy-dev'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: 生成 sha 镜像标签
        id: meta
        run: echo "SHA_TAG=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: 构建 Docker 镜像
        run: |
          docker build \
            -t video-to-audio:${{ steps.meta.outputs.SHA_TAG }} .

      - name: 登录 Docker Hub
        run: echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

      - name: 推送镜像（sha tag）
        run: |
          docker tag video-to-audio:${{ steps.meta.outputs.SHA_TAG }} ${{ secrets.DOCKER_HUB_USERNAME }}/video-to-audio:${{ steps.meta.outputs.SHA_TAG }}
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/video-to-audio:${{ steps.meta.outputs.SHA_TAG }}

      - name: 触发 infra 仓库部署前端（测试环境）
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0  # v3
        with:
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          repository: ${{ github.repository_owner }}/infra
          event-type: deploy-video-frontend
          client-payload: |
            {
              "image_tag": "${{ steps.meta.outputs.SHA_TAG }}",
              "environment": "dev"
            }

  # ==================== CD：生产环境部署 ====================
  # 触发：workflow_dispatch + event=deploy-prod + 填写 tag
  #
  # 一次构建原则（核心）：
  #   不重新构建镜像，只给测试阶段已验证的 sha 镜像追加语义版本 tag
  #   docker buildx imagetools create 是纯 manifest 操作，不产生新镜像层
  #   保证"测试通过的"和"上线的"是同一个二进制产物
  deploy-prod:
    needs: ci
    if: github.event_name == 'workflow_dispatch' && inputs.event == 'deploy-prod'
    runs-on: ubuntu-latest

    steps:
      - name: 校验 tag 参数不能为空
        run: |
          if [ -z "${{ inputs.tag }}" ]; then
            echo "❌ 生产部署必须填写 tag 参数，如 v1.0.0"
            exit 1
          fi

      - name: Checkout 代码（用于获取 tag 对应的 sha）
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          # 检出指定 tag，使得 github.sha 对应该 tag 的 commit
          ref: ${{ inputs.tag }}

      - name: 生成镜像标签
        id: meta
        run: |
          echo "VERSION_TAG=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          echo "SHA_TAG=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: 登录 Docker Hub
        run: echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

      # 不重新构建，给 sha 镜像追加语义版本 tag
      # 前提：该 sha 对应的镜像已在 deploy-dev 阶段推送到 Docker Hub
      - name: 给 sha 镜像追加语义版本 tag
        run: |
          docker buildx imagetools create \
            --tag ${{ secrets.DOCKER_HUB_USERNAME }}/video-to-audio:${{ steps.meta.outputs.VERSION_TAG }} \
            ${{ secrets.DOCKER_HUB_USERNAME }}/video-to-audio:${{ steps.meta.outputs.SHA_TAG }}

      - name: 触发 infra 仓库部署前端（生产环境）
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0  # v3
        with:
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          repository: ${{ github.repository_owner }}/infra
          event-type: deploy-video-frontend
          client-payload: |
            {
              "image_tag": "${{ steps.meta.outputs.VERSION_TAG }}",
              "environment": "prod"
            }
