server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # 大文件上传支持（分片单片最大 10MB，留足余量）
    client_max_body_size 20M;

    # ==================== 反向代理：SSE 进度接口（无缓冲）====================
    #
    # SSE 连接必须关闭代理缓冲，否则 Nginx 会等数据积累到一定量才转发
    # 导致前端收不到实时进度推送
    #
    location /api/convert/progress/ {
        proxy_pass http://backend:3000;
        proxy_buffering off;
        proxy_cache off;
        # 关闭 keep-alive，确保 SSE 使用持久连接
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        # 支持分块传输编码（SSE 依赖）
        chunked_transfer_encoding on;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
        # SSE 长连接超时设置（1小时，防止 Nginx 提前断开）
        proxy_read_timeout 3600s;
    }

    # ==================== 反向代理：监控上报与查询 ====================
    #
    # monitor-backend 独立部署，nginx 容器通过环境变量 MONITOR_BACKEND_URL 寻址。
    # 本地开发不走 Docker，浏览器直连 localhost:3100，此配置不生效。
    #
    # MONITOR_BACKEND_URL 由 infra 仓库的 docker-compose.dev.yml / prod.yml 注入：
    #   测试环境：http://127.0.0.1:3101（monitor-backend 测试实例）
    #   生产环境：http://127.0.0.1:3100（monitor-backend 生产实例）
    #
    # nginx 镜像启动时通过 envsubst 将占位符替换为实际值（见 Dockerfile）
    #
    location /monitor/ {
        proxy_pass ${MONITOR_BACKEND_URL};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
    }

    # ==================== 反向代理：其他 API 请求 ====================
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
    }

    # ==================== SPA 路由兜底 ====================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ==================== 静态资源：长期强缓存 ====================
    # Webpack contenthash 确保内容变了 URL 就变，故可永久缓存
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ==================== index.html：协商缓存 ====================
    # HTML 不能强缓存，否则更新后用户拿到旧 JS 引用
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
